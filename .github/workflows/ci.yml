name: CI

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Check JavaScript syntax
        run: |
          node --check server/src/constants.js
          node --check server/src/rooms.js
          node --check server/src/index.js
          node --check client/public/src/main.js

      - name: Smoke-test server
        run: |
          npm start > /tmp/fighting-2.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:3000/health > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 0.5
          done
          cat /tmp/fighting-2.log
          exit 1
