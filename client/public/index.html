<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#09090b">
  <title>Fighting-2</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/combat.css">
</head>
<body>
  <main id="app">
    <section id="lobby-screen" class="screen active">
      <div class="panel hero-panel">
        <p class="eyebrow">ONLINE DUEL</p>
        <h1>FIGHTING<span>-2</span></h1>
        <p class="subtitle">Авторитетный сервер, комнаты по короткому коду, два устройства.</p>

        <button id="create-room" class="primary-button">Создать комнату</button>

        <div class="divider"><span>или</span></div>

        <form id="join-form" autocomplete="off">
          <label for="room-code">Код комнаты</label>
          <div class="join-row">
            <input id="room-code" name="roomCode" maxlength="4" inputmode="text" placeholder="A7K2" aria-label="Код комнаты">
            <button class="secondary-button" type="submit">Войти</button>
          </div>
        </form>

        <p id="lobby-message" class="message" aria-live="polite"></p>
      </div>
    </section>

    <section id="waiting-screen" class="screen">
      <div class="panel waiting-panel">
        <p class="eyebrow">КОМНАТА СОЗДАНА</p>
        <h2 id="waiting-code">----</h2>
        <p>Передайте код второму игроку.</p>
        <div class="pulse-loader" aria-hidden="true"></div>
        <p class="muted">Ожидание соперника…</p>
        <button id="copy-code" class="secondary-button">Копировать код</button>
      </div>
    </section>

    <section id="game-screen" class="screen game-screen">
      <header class="game-header">
        <div>
          <span class="hud-label">КОМНАТА</span>
          <strong id="hud-room">----</strong>
        </div>
        <div class="connection-box">
          <span id="connection-dot" class="connection-dot"></span>
          <span id="connection-text">Подключено</span>
          <span id="ping-label">-- ms</span>
        </div>
      </header>

      <div class="health-hud" aria-label="Здоровье бойцов">
        <div class="health-side health-side-left">
          <span class="health-name">P1</span>
          <div class="health-pips" id="health-p1">
            <span class="health-pip"></span>
            <span class="health-pip"></span>
          </div>
        </div>
        <div class="health-side health-side-right">
          <div class="health-pips" id="health-p2">
            <span class="health-pip"></span>
            <span class="health-pip"></span>
          </div>
          <span class="health-name">P2</span>
        </div>
      </div>

      <div id="canvas-shell" class="canvas-shell">
        <canvas id="game-canvas" width="1000" height="560" aria-label="Игровая арена"></canvas>
        <div id="game-overlay" class="game-overlay hidden">
          <div class="overlay-card">
            <h2 id="overlay-title">Матч завершён</h2>
            <p id="overlay-message">Результат матча.</p>
            <div class="overlay-actions">
              <button id="play-again" class="primary-button hidden">Играть снова</button>
              <button id="return-lobby" class="secondary-button">Вернуться в меню</button>
            </div>
          </div>
        </div>
      </div>

      <div class="controls" aria-label="Управление">
        <div class="movement-pad">
          <button id="move-left" class="control-button movement-button" aria-label="Двигаться влево">◀</button>
          <button id="move-right" class="control-button movement-button" aria-label="Двигаться вправо">▶</button>
        </div>
        <button id="attack-button" class="control-button attack-button" aria-label="Атаковать">
          <span class="attack-button-content">
            <strong>УДАР</strong>
            <small id="attack-cooldown-label">ГОТОВ</small>
          </span>
        </button>
      </div>

      <p class="desktop-hint">Клавиатура: A / D или ← / →, пробел — удар</p>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/src/main.js" defer></script>
  <script src="/src/waiting-room-connection.js" defer></script>
  <script src="/src/room-lifecycle.js" defer></script>
  <script src="/src/generated-renderer.js" defer></script>
  <script src="/src/combat.js" defer></script>
</body>
</html>
